id: api-version-downgrade
info:
  name: API Version Downgrade - Auth Bypass
  author: n4igme
  severity: high
  description: Tests if older API versions lack authentication enforcement
  tags: api,version,auth-bypass,downgrade

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v0/users"
      - "{{BaseURL}}/api/v1/users"
      - "{{BaseURL}}/api/beta/users"
      - "{{BaseURL}}/api/internal/users"
      - "{{BaseURL}}/api/legacy/users"
      - "{{BaseURL}}/v0/users"
      - "{{BaseURL}}/internal/users"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "email"
          - "username"
          - "id"
        condition: or
    stop-at-first-match: true
