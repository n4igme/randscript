id: cors-credentials-reflection
info:
  name: CORS Origin Reflection with Credentials
  author: n4igme
  severity: high
  description: Detects CORS misconfiguration where arbitrary origin is reflected with Allow-Credentials true
  tags: cors,misconfiguration,credentials

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      Origin: "https://evil.attacker.com"
    matchers-condition: and
    matchers:
      - type: word
        part: header
        words:
          - "Access-Control-Allow-Credentials: true"
      - type: word
        part: header
        words:
          - "evil.attacker.com"
