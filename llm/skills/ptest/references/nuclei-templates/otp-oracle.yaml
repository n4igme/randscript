id: otp-oracle-differential
info:
  name: OTP Oracle - Differential Response Detection
  author: n4igme
  severity: medium
  description: Detects if OTP/verification endpoints return different responses for valid vs invalid codes (oracle for brute-force)
  tags: otp,oracle,brute-force,auth

http:
  - method: POST
    path:
      - "{{BaseURL}}/api/verify"
      - "{{BaseURL}}/api/v1/verify"
      - "{{BaseURL}}/api/otp/verify"
      - "{{BaseURL}}/api/validate"
      - "{{BaseURL}}/api/confirm"
      - "{{BaseURL}}/api/bind"
    headers:
      Content-Type: application/json
    body: '{"code":"000000"}'
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 400
          - 422
      - type: word
        words:
          - "invalid"
          - "incorrect"
          - "expired"
          - "wrong"
        condition: or
    extractors:
      - type: dsl
        dsl:
          - "status_code + ' ' + content_length"
