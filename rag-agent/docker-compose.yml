services:
  # PostgreSQL with PGVector
  postgres:
    image: pgvector/pgvector:pg15
    container_name: rag_postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RAG Web App
  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_web_app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://raguser:ragpass@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      LLM_CHOICE: ${LLM_CHOICE}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LOG_LEVEL: INFO
    volumes:
      - ./documents:/app/documents
      - ./.env:/app/.env
    command: ["uv", "run", "python", "web_app.py", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  # Optional: Document ingestion service
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_ingestion
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://raguser:ragpass@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      LLM_CHOICE: ${LLM_CHOICE}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
    volumes:
      - ./documents:/app/documents
      - ./.env:/app/.env
    command: ["uv", "run", "python", "ingestion/ingest.py", "--documents", "/app/documents"]
    profiles:
      - ingestion

volumes:
  postgres_data: