        div.innerHTML = '<span class="method">' + method + '()</span><br>' +

            'launchChallengeV2',

                        log(method, 'Accessible. Return: ' + JSON.stringify(result).substring(0, 200), true);

                        log(method, 'Method exists and is callable (not invoked to avoid side effects)', true);
                    }
                } else {
                    log(method, 'Property exists but not a function: ' + typeof OneKycAndroidInterface[method], false);
                }
            } catch(e) {
                log(method, 'Error: ' + e.message, false);

        // Show what an attacker could do

        summary.className = 'result success';
